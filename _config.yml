# Jekyll Configuration for GitHub Pages
# https://jekyllrb.com/docs/configuration/

title: IT Journey
description: ''
author: Pilarski
email: 
language: en
timezone: 

# GitHub Pages URL
url: "https://pilarskikt.github.io"
baseurl: ""
permalink: /:year/:month/:day/:title/

# Build
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Theme (Minima is default and fully supported on GitHub Pages)
theme: minima

# Minima theme settings
minima:
  skin: classic
  date_format: "%Y-%m-%d"
  social_links: {}

# Optional: show author in footer
show_author: true

# Giscus comments (included via _includes/comments.html)
giscus:
  repo: pilarskikt/pilarskikt.github.io
  repo_id: R_kgDOI5irmA
  category: General
  category_id: DIC_kwDOI5irmM4CT_7O
  mapping: title
  strict: "0"
  reactions_enabled: "1"
  emit_metadata: "0"
  input_position: bottom
  theme: preferred_color_scheme
  lang: en

# Exclude from Jekyll processing (these stay in repo for CI / reference)
exclude:
  - node_modules
  - vendor
  - themes
  - source
  - scaffolds
  - package.json
  - package-lock.json
  - .git
  - .github
